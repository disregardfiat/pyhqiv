# Read the Docs configuration (https://docs.readthedocs.io/)
version: 2
build:
  os: ubuntu-22.04
  tools:
    python: "3.11"
  jobs:
    post_checkout: []
  steps:
    - install: pip
    - pip:
        - -e .
        - sphinx
    - build:
        commands:
          - sphinx-build -b html docs docs/_build
