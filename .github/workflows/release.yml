# Publish to PyPI when a version tag (v*) is pushed.
# Version is taken from the tag via setuptools_scm (e.g. v0.4.0 → 0.4.0).
#
# Uses GitHub secret PYPI_API_TOKEN (PyPI API token with upload scope).
# Token auth only — no OIDC/trusted publishing.

name: Publish to PyPI

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # setuptools_scm needs history to get version from tag

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build setuptools_scm twine

      - name: Update CITATION.cff from tag
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          python scripts/update_citation_cff.py --version "${TAG#v}" --date $(date -u +%Y-%m-%d)

      - name: Build package
        run: python -m build

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: twine upload dist/*
